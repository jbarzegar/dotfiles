name: "Check macOS"

on:
  pull_request:

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31.10.5
      - name: Create apple user
        run: |
          sudo dscl . -create /Users/james
          sudo dscl . -create /Users/james UserShell /bin/bash
          sudo dscl . -append /Groups/admin GroupMembership james
          dscl . list /Users
      - name: Copy nix config
        run: sudo ln -s ./dot_config/nix-darwin /etc/nix-darwin

      - name: Checking nix build
        run: |
          sudo su - james
          sudo nix run nix-darwin/nix-darwin-25.11#darwin-rebuild -- switch
